name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code: ['**/*.py']
            deps:
              - '**/*.py'
              - pyproject.toml
              - uv.lock

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Lint
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-python-env

      - name: Run ruff linter
        run: nox -s lint

  format:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Format
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-python-env

      - name: Check code formatting
        run: nox -s format

  test:
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    name: Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-python-env

      - name: Run tests
        run: nox -s "tests"
        env:
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
